<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Integrated Payment System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-container"></div>
<div class="container" style="padding:40px 24px 60px;">
  <h1 class="page-title">💳 Checkout</h1>
  <div id="checkout-wrap"></div>
</div>

<script src="js/db.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script>
<script src="js/fx.js"></script><script src="js/commission.js"></script><script src="js/cart.js"></script>
<script src="js/notifications.js"></script><script src="js/payment.js"></script>
<script src="js/seed.js"></script><script src="js/nav.js"></script>
<script>
let currentOrder = null;

function renderCheckout() {
  const session = auth.getSession();
  const wrap = document.getElementById('checkout-wrap');

  if (!session || session.role !== 'customer') {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔒</div><h3>Login Required</h3><a href="account.html" class="btn btn-primary">Login</a></div>`;
    return;
  }

  const items = cart.get();
  if (!items.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛒</div><h3>Cart is empty</h3><a href="products.html" class="btn btn-primary">Shop Now</a></div>`;
    return;
  }

  const totals = cart.totals();
  const customer = db.find('customers', session.id) || {};

  const itemRows = items.map(item => {
    const p = db.find('products', item.product_id) || {};
    return `<div class="summary-row"><span>${p.title} × ${item.quantity}</span><span>${utils.formatBDT(item.subtotal_bdt)}</span></div>`;
  }).join('');

  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start;">
      <!-- Form -->
      <div>
        <div class="card card-body" style="margin-bottom:20px;">
          <h3 style="font-size:17px;font-weight:700;margin-bottom:16px;">📋 Billing Information</h3>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Full Name</label><input id="f-name" class="form-control" value="${customer.name || session.name || ''}"></div>
            <div class="form-group"><label class="form-label">Phone</label><input id="f-phone" class="form-control" value="${customer.phone || ''}" placeholder="+880..."></div>
          </div>
          <div class="form-group"><label class="form-label">Email</label><input id="f-email" class="form-control" type="email" value="${customer.email || session.email || ''}"></div>
          <div class="form-group"><label class="form-label">Billing Address</label><textarea id="f-addr" class="form-control" rows="3" placeholder="House, Road, City, District">${customer.billing_address || ''}</textarea></div>
        </div>

        <div class="card card-body">
          <h3 style="font-size:17px;font-weight:700;margin-bottom:16px;">💳 Payment Method</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
            <label class="pay-method-card active" id="pm-mobile" onclick="selectMethod('mobile')">
              <input type="radio" name="pm" value="mobile" checked style="display:none;">
              <div style="font-size:28px;margin-bottom:6px;">📱</div>
              <div style="font-weight:700;font-size:14px;">Mobile Banking</div>
              <div style="font-size:12px;color:#64748b;">bKash, Nagad, Rocket</div>
            </label>
            <label class="pay-method-card" id="pm-card" onclick="selectMethod('card')">
              <input type="radio" name="pm" value="card" style="display:none;">
              <div style="font-size:28px;margin-bottom:6px;">💳</div>
              <div style="font-weight:700;font-size:14px;">Debit / Credit Card</div>
              <div style="font-size:12px;color:#64748b;">Visa, Mastercard</div>
            </label>
          </div>

          <!-- Mobile Banking fields -->
          <div id="mobile-fields">
            <div class="form-group"><label class="form-label">Mobile Number</label><input id="f-mobile" class="form-control" placeholder="01XXXXXXXXX"></div>
            <div style="padding:12px;background:#f0fdf4;border-radius:8px;font-size:13px;color:#065f46;border:1px solid #bbf7d0;">
              🔒 Simulated payment — no real transaction will occur
            </div>
          </div>

          <!-- Card fields -->
          <div id="card-fields" style="display:none;">
            <div class="form-group"><label class="form-label">Card Number</label><input id="f-card" class="form-control" placeholder="4242 4242 4242 4242" maxlength="19"></div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">Expiry</label><input id="f-expiry" class="form-control" placeholder="MM/YY" maxlength="5"></div>
              <div class="form-group"><label class="form-label">CVV</label><input id="f-cvv" class="form-control" placeholder="123" maxlength="3"></div>
            </div>
            <div style="padding:12px;background:#f0fdf4;border-radius:8px;font-size:13px;color:#065f46;border:1px solid #bbf7d0;">
              🔒 Simulated payment — no real transaction will occur
            </div>
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div>
        <div class="summary-box">
          <h3 style="font-size:17px;font-weight:700;margin-bottom:16px;">Order Summary</h3>
          ${itemRows}
          <hr class="divider">
          <div class="summary-row"><span>Subtotal</span><span>${utils.formatBDT(totals.subtotal)}</span></div>
          <div class="summary-row"><span>Commission</span><span>${utils.formatBDT(totals.commissionFee)}</span></div>
          <div class="summary-row" style="font-size:20px;font-weight:800;">
            <span>Total</span><span class="text-primary">${utils.formatBDT(totals.total)}</span>
          </div>
          <button id="pay-btn" class="btn btn-primary btn-full btn-lg" style="margin-top:20px;" onclick="placeOrder()">
            🔒 Pay ${utils.formatBDT(totals.total)}
          </button>
          <a href="cart.html" style="display:block;text-align:center;margin-top:12px;font-size:13px;color:#64748b;">← Back to Cart</a>
        </div>
      </div>
    </div>`;
}

function selectMethod(m) {
  document.getElementById('mobile-fields').style.display = m === 'mobile' ? 'block' : 'none';
  document.getElementById('card-fields').style.display = m === 'card' ? 'block' : 'none';
  document.getElementById('pm-mobile').className = 'pay-method-card' + (m === 'mobile' ? ' active' : '');
  document.getElementById('pm-card').className   = 'pay-method-card' + (m === 'card'   ? ' active' : '');
}

async function placeOrder() {
  const session = auth.getSession();
  const addr = document.getElementById('f-addr')?.value?.trim();
  if (!addr) { utils.toast('Please enter billing address', 'error'); return; }

  const method = document.querySelector('input[name="pm"]:checked')?.value === 'card' ? 'Card' : 'Mobile Banking';
  const items = cart.get();
  const totals = cart.totals();
  const btn = document.getElementById('pay-btn');

  // Create order first
  currentOrder = payment.createOrder(session, addr, items, totals);

  // Show loading
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processing Payment...';

  // Save address to customer profile
  db.update('customers', session.id, { billing_address: addr, phone: document.getElementById('f-phone')?.value || '' });

  // Process payment
  const result = await payment.process(currentOrder.id, totals.total, method);

  if (result.ok) {
    // Clear cart
    cart.clear();
    // Show success
    document.querySelector('.container').innerHTML = `
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h2>Payment Successful!</h2>
        <p style="color:#64748b;margin-bottom:12px;">Your order has been confirmed</p>
        <div class="txn-chip">Transaction ID: ${result.txnId}</div>
        <div style="margin:16px 0;padding:20px;background:#f8fafc;border-radius:12px;max-width:360px;margin:16px auto;">
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e2e8f0;"><span>Order #</span><strong>${currentOrder.id}</strong></div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e2e8f0;"><span>Amount Paid</span><strong style="color:#4f46e5;">${utils.formatBDT(totals.total)}</strong></div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;"><span>Method</span><strong>${method}</strong></div>
        </div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="orders.html" class="btn btn-primary btn-lg">View My Orders</a>
          <a href="products.html" class="btn btn-outline btn-lg">Continue Shopping</a>
        </div>
      </div>`;
  }
}

// Card number formatting
document.addEventListener('DOMContentLoaded', () => {
  renderCheckout();
  document.addEventListener('input', e => {
    if (e.target.id === 'f-card') {
      e.target.value = e.target.value.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim().slice(0,19);
    }
    if (e.target.id === 'f-expiry') {
      e.target.value = e.target.value.replace(/\D/g,'').replace(/^(\d{2})(\d)/,'$1/$2').slice(0,5);
    }
  });
});
</script>
<style>
.pay-method-card{display:block;padding:16px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;text-align:center;transition:all .2s;}
.pay-method-card.active{border-color:#4f46e5;background:#eef2ff;}
</style>
</body>
</html>
