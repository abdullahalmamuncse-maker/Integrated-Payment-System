<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Integrated Payment System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-container"></div>
<div class="container" style="padding:40px 24px 60px;">
  <h1 class="page-title">🛒 Shopping Cart</h1>
  <div id="cart-content"></div>
</div>

<script src="js/db.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script>
<script src="js/fx.js"></script><script src="js/commission.js"></script><script src="js/cart.js"></script>
<script src="js/notifications.js"></script><script src="js/payment.js"></script>
<script src="js/seed.js"></script><script src="js/nav.js"></script>
<script>
function renderCart() {
  const session = auth.getSession();
  const wrap = document.getElementById('cart-content');

  if (!session || session.role !== 'customer') {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔒</div><h3>Login Required</h3><p>Please login to view your cart</p><a href="account.html" class="btn btn-primary">Login</a></div>`;
    return;
  }

  const items = cart.get();
  if (!items.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛒</div><h3>Your cart is empty</h3><p>Add products to continue shopping</p><a href="products.html" class="btn btn-primary">Shop Now</a></div>`;
    return;
  }

  const totals = cart.totals();
  const rows = items.map(item => {
    const product = db.find('products', item.product_id) || {};
    return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:12px;">
            <img src="images/${product.image || 'product-1.jpg'}" class="cart-item-img">
            <div>
              <div style="font-weight:600;color:#0f172a;">${product.title || 'Product'}</div>
              <div style="font-size:12px;color:#64748b;">${item.size ? 'Size: ' + item.size : ''}</div>
              <div style="font-size:13px;color:#4f46e5;">${utils.formatBDT(item.unit_price_bdt)} each</div>
            </div>
          </div>
        </td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <button onclick="updateQty(${item.id}, ${item.quantity - 1})" class="btn btn-ghost btn-sm" ${item.quantity <= 1 ? 'disabled' : ''}>−</button>
            <input class="qty-input" type="number" value="${item.quantity}" min="1" onchange="updateQty(${item.id}, parseInt(this.value))">
            <button onclick="updateQty(${item.id}, ${item.quantity + 1})" class="btn btn-ghost btn-sm">+</button>
          </div>
        </td>
        <td><strong>${utils.formatBDT(item.subtotal_bdt)}</strong></td>
        <td><button onclick="removeItem(${item.id})" class="remove-btn" title="Remove">🗑</button></td>
      </tr>`;
  }).join('');

  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start;margin-top:24px;">
      <div class="card">
        <table class="cart-table">
          <thead><tr><th>Product</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="padding:16px;display:flex;gap:12px;">
          <a href="products.html" class="btn btn-ghost">← Continue Shopping</a>
          <button onclick="clearCart()" class="btn btn-danger">🗑 Clear Cart</button>
        </div>
      </div>
      <div>
        <div class="summary-box">
          <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>${utils.formatBDT(totals.subtotal)}</span></div>
          <div class="summary-row"><span>Commission Fee</span><span>${utils.formatBDT(totals.commissionFee)}</span></div>
          <div class="summary-row" style="font-size:18px;font-weight:800;border-top:2px solid #e2e8f0;margin-top:8px;padding-top:12px;">
            <span>Total</span><span class="text-primary summary-total">${utils.formatBDT(totals.total)}</span>
          </div>
          <a href="checkout.html" class="btn btn-primary btn-full btn-lg" style="margin-top:20px;">Proceed to Checkout →</a>
          <div style="margin-top:12px;text-align:center;font-size:12px;color:#64748b;">🔒 Secured by Integrated Payment System</div>
        </div>
      </div>
    </div>`;
}

function updateQty(itemId, qty) {
  if (qty < 1) { removeItem(itemId); return; }
  cart.updateQty(itemId, qty);
  renderCart();
}

function removeItem(itemId) {
  cart.remove(itemId);
  renderCart();
  utils.toast('Item removed from cart', 'info');
}

function clearCart() {
  if (utils.confirm('Clear all items from cart?')) {
    cart.clear();
    renderCart();
  }
}

document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
