<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Admin | Integrated Payment System</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand"><a href="index.html"><span>💳</span><div><div>IPS Admin</div><small>Integrated Payment System</small></div></a></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Main</div>
      <a href="index.html"         class="sidebar-link"><span class="sidebar-link-icon">📊</span> Dashboard</a>
      <a href="orders.html"        class="sidebar-link"><span class="sidebar-link-icon">📦</span> Orders</a>
      <a href="products.html"      class="sidebar-link active"><span class="sidebar-link-icon">🛍️</span> Products</a>
      <a href="customers.html"     class="sidebar-link"><span class="sidebar-link-icon">👥</span> Customers</a>
      <div class="sidebar-section">Config</div>
      <a href="suppliers.html"     class="sidebar-link"><span class="sidebar-link-icon">🏭</span> Suppliers</a>
      <a href="fx-rates.html"      class="sidebar-link"><span class="sidebar-link-icon">💱</span> FX Rates</a>
      <a href="commissions.html"   class="sidebar-link"><span class="sidebar-link-icon">💰</span> Commissions</a>
      <a href="inventory.html"     class="sidebar-link"><span class="sidebar-link-icon">📋</span> Inventory</a>
      <div class="sidebar-section">Logs</div>
      <a href="notifications.html" class="sidebar-link"><span class="sidebar-link-icon">🔔</span> Notifications</a>
      <a href="sync-logs.html"     class="sidebar-link"><span class="sidebar-link-icon">🔄</span> Sync Logs</a>
      <a href="../index.html"      class="sidebar-link"><span class="sidebar-link-icon">🏠</span> View Store</a>
    </nav>
    <div class="sidebar-footer">
      <button onclick="auth.logout()" style="width:100%;background:rgba(239,68,68,.15);color:#f87171;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">Logout</button>
    </div>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-header-title">Product Management</div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
    </header>
    <div class="admin-content">
      <div class="search-bar">
        <input id="search" class="search-input" placeholder="🔍 Search products..." oninput="renderTable()">
        <select id="cat-filter" class="search-input" style="width:160px;" onchange="renderTable()"><option value="">All Categories</option></select>
        <select id="sup-filter" class="search-input" style="width:160px;" onchange="renderTable()"><option value="">All Suppliers</option></select>
      </div>
      <div class="data-table-wrap">
        <div class="data-table-header">
          <span class="data-table-title">Products <span id="prod-count" style="color:#64748b;font-weight:400;font-size:13px;"></span></span>
        </div>
        <table class="data-table">
          <thead><tr><th>Image</th><th>Title</th><th>SKU</th><th>Category</th><th>Supplier</th><th>Price (BDT)</th><th>Stock</th><th>Actions</th></tr></thead>
          <tbody id="prod-table"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Product</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Title *</label><input id="f-title" class="form-control" placeholder="Product title"></div>
        <div class="form-group"><label class="form-label">SKU</label><input id="f-sku" class="form-control" placeholder="Auto-generated"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Category *</label>
          <select id="f-cat" class="form-control"><option>Tops</option><option>Bottoms</option><option>Footwear</option><option>Dresses</option><option>Outerwear</option><option>Activewear</option></select>
        </div>
        <div class="form-group"><label class="form-label">Supplier *</label><select id="f-sup" class="form-control"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Price USD *</label><input id="f-usd" class="form-control" type="number" step="0.01" oninput="calcBDT()"></div>
        <div class="form-group"><label class="form-label">Price BDT (auto)</label><input id="f-bdt" class="form-control" readonly style="background:#f8fafc;"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Stock Qty *</label><input id="f-stock" class="form-control" type="number" value="10"></div>
        <div class="form-group"><label class="form-label">Rating (0-5)</label><input id="f-rating" class="form-control" type="number" step="0.1" min="0" max="5" value="4.0"></div>
      </div>
      <div class="form-group"><label class="form-label">Image filename</label><input id="f-img" class="form-control" placeholder="product-1.jpg"></div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="f-desc" class="form-control" rows="3"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script src="../js/db.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script src="../js/fx.js"></script><script src="../js/commission.js"></script><script src="../js/notifications.js"></script>
<script src="../js/payment.js"></script><script src="../js/cart.js"></script><script src="../js/seed.js"></script>
<script>
let editingId = null;

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const cat    = document.getElementById('cat-filter').value;
  const sup    = parseInt(document.getElementById('sup-filter').value) || 0;

  let products = db.get('products');
  if (search) products = products.filter(p => p.title.toLowerCase().includes(search) || p.sku.toLowerCase().includes(search));
  if (cat) products = products.filter(p => p.category === cat);
  if (sup) products = products.filter(p => p.supplier_id === sup);

  document.getElementById('prod-count').textContent = `(${products.length})`;

  document.getElementById('prod-table').innerHTML = products.map(p => {
    const supplier = db.find('suppliers', p.supplier_id) || {};
    return `<tr>
      <td><img src="../images/${p.image}" class="tbl-img"></td>
      <td><strong>${p.title}</strong></td>
      <td style="font-size:12px;color:#64748b;">${p.sku}</td>
      <td>${p.category}</td>
      <td>${supplier.name || '—'}</td>
      <td><strong>${utils.formatBDT(p.price_bdt)}</strong><br><span style="font-size:11px;color:#94a3b8;">${utils.formatUSD(p.price_usd)}</span></td>
      <td><span style="color:${p.stock_qty<5?'#ef4444':p.stock_qty<10?'#f59e0b':'#10b981'};font-weight:700;">${p.stock_qty}</span></td>
      <td class="table-actions">
        <button class="btn btn-ghost btn-xs" onclick="editProduct(${p.id})">✏️ Edit</button>
        <button class="btn btn-danger btn-xs" onclick="deleteProduct(${p.id})">🗑</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8;">No products found</td></tr>';
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit Product' : 'Add Product';
  document.getElementById('edit-id').value = id || '';

  // Populate suppliers
  const supSel = document.getElementById('f-sup');
  supSel.innerHTML = db.get('suppliers').map(s => `<option value="${s.id}">${s.name}</option>`).join('');

  if (id) {
    const p = db.find('products', id);
    if (!p) return;
    document.getElementById('f-title').value  = p.title;
    document.getElementById('f-sku').value    = p.sku;
    document.getElementById('f-cat').value    = p.category;
    document.getElementById('f-sup').value    = p.supplier_id;
    document.getElementById('f-usd').value    = p.price_usd;
    document.getElementById('f-bdt').value    = p.price_bdt;
    document.getElementById('f-stock').value  = p.stock_qty;
    document.getElementById('f-rating').value = p.rating;
    document.getElementById('f-img').value    = p.image;
    document.getElementById('f-desc').value   = p.description;
  } else {
    ['f-title','f-sku','f-usd','f-bdt','f-img','f-desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-stock').value  = 10;
    document.getElementById('f-rating').value = 4.0;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function calcBDT() {
  const usd = parseFloat(document.getElementById('f-usd').value) || 0;
  document.getElementById('f-bdt').value = (usd * fx.currentRate()).toFixed(2);
}

function saveProduct() {
  const title  = document.getElementById('f-title').value.trim();
  const usd    = parseFloat(document.getElementById('f-usd').value);
  const stock  = parseInt(document.getElementById('f-stock').value);
  const supId  = parseInt(document.getElementById('f-sup').value);
  if (!title || !usd || !supId) { utils.toast('Please fill required fields', 'error'); return; }

  const data = {
    title,
    sku:         document.getElementById('f-sku').value || utils.generateSKU('PRD'),
    category:    document.getElementById('f-cat').value,
    supplier_id: supId,
    price_usd:   usd,
    price_bdt:   parseFloat((usd * fx.currentRate()).toFixed(2)),
    fx_rate_id:  1,
    stock_qty:   stock,
    rating:      parseFloat(document.getElementById('f-rating').value) || 4.0,
    image:       document.getElementById('f-img').value || 'product-1.jpg',
    description: document.getElementById('f-desc').value,
    last_synced_at: new Date().toISOString(),
    commission_id: supId === 1 ? 1 : 2
  };

  if (editingId) {
    const old = db.find('products', editingId);
    db.update('products', editingId, data);
    db.insert('product_sync_logs', { supplier_id:supId, product_id:editingId, action:'price_update', old_price:old.price_usd, new_price:usd, old_stock:old.stock_qty, new_stock:stock, sync_time:new Date().toISOString(), notes:'Admin update' });
    utils.toast('Product updated!', 'success');
  } else {
    const newP = db.insert('products', data);
    db.insert('inventory', { product_id:newP.id, supplier_id:supId, stock_qty:stock, reserved_qty:0, updated_at:new Date().toISOString() });
    db.insert('product_sync_logs', { supplier_id:supId, product_id:newP.id, action:'initial_sync', old_price:0, new_price:usd, old_stock:0, new_stock:stock, sync_time:new Date().toISOString(), notes:'Admin create' });
    utils.toast('Product added!', 'success');
  }
  closeModal(); renderTable();
}

function editProduct(id)   { openModal(id); }
function deleteProduct(id) {
  if (!utils.confirm('Delete this product?')) return;
  db.delete('products', id);
  db.delete('inventory', db.findOne('inventory', r => r.product_id === id)?.id);
  utils.toast('Product deleted', 'info');
  renderTable();
}

document.addEventListener('DOMContentLoaded', () => {
  seedDatabase();
  if (!auth.requireRole('admin')) return;
  // Populate filters
  const cats = [...new Set(db.get('products').map(p => p.category))];
  cats.forEach(c => { document.getElementById('cat-filter').innerHTML += `<option>${c}</option>`; });
  db.get('suppliers').forEach(s => { document.getElementById('sup-filter').innerHTML += `<option value="${s.id}">${s.name}</option>`; });
  renderTable();
});
</script>
</body>
</html>
