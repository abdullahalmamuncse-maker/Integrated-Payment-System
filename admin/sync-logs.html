<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sync Logs — Admin | IPS</title><link rel="stylesheet" href="../css/admin.css"></head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand"><a href="index.html"><span>💳</span><div><div>IPS Admin</div><small>Integrated Payment System</small></div></a></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span> Dashboard</a>
      <a href="orders.html" class="sidebar-link"><span class="sidebar-link-icon">📦</span> Orders</a>
      <a href="products.html" class="sidebar-link"><span class="sidebar-link-icon">🛍️</span> Products</a>
      <a href="customers.html" class="sidebar-link"><span class="sidebar-link-icon">👥</span> Customers</a>
      <a href="suppliers.html" class="sidebar-link"><span class="sidebar-link-icon">🏭</span> Suppliers</a>
      <a href="fx-rates.html" class="sidebar-link"><span class="sidebar-link-icon">💱</span> FX Rates</a>
      <a href="commissions.html" class="sidebar-link"><span class="sidebar-link-icon">💰</span> Commissions</a>
      <a href="inventory.html" class="sidebar-link"><span class="sidebar-link-icon">📋</span> Inventory</a>
      <a href="notifications.html" class="sidebar-link"><span class="sidebar-link-icon">🔔</span> Notifications</a>
      <a href="sync-logs.html" class="sidebar-link active"><span class="sidebar-link-icon">🔄</span> Sync Logs</a>
      <a href="../index.html" class="sidebar-link"><span class="sidebar-link-icon">🏠</span> View Store</a>
    </nav>
    <div class="sidebar-footer"><button onclick="auth.logout()" style="width:100%;background:rgba(239,68,68,.15);color:#f87171;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">Logout</button></div>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-header-title">Product Sync Logs</div>
      <span id="log-count" style="color:#64748b;font-size:13px;"></span>
    </header>
    <div class="admin-content">
      <!-- Filters -->
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
        <select id="filter-supplier" class="form-control" style="max-width:200px;" onchange="renderTable()">
          <option value="">All Suppliers</option>
        </select>
        <select id="filter-action" class="form-control" style="max-width:180px;" onchange="renderTable()">
          <option value="">All Actions</option>
          <option value="price_update">Price Update</option>
          <option value="stock_adjust">Stock Adjust</option>
          <option value="fx_update">FX Rate Update</option>
          <option value="supplier_sync">Supplier Sync</option>
          <option value="product_create">Product Created</option>
        </select>
        <input id="filter-product" class="form-control" style="max-width:220px;" placeholder="🔍 Search product..." oninput="renderTable()">
        <button class="btn btn-ghost btn-sm" onclick="clearLogs()" style="margin-left:auto;color:#ef4444;">🗑 Clear All Logs</button>
      </div>

      <!-- Log Table -->
      <div class="data-table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Product</th>
              <th>Supplier</th>
              <th>Action</th>
              <th>Old Price (USD)</th>
              <th>New Price (USD)</th>
              <th>Old Stock</th>
              <th>New Stock</th>
              <th>Notes</th>
              <th>Sync Time</th>
            </tr>
          </thead>
          <tbody id="log-table"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="../js/db.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script src="../js/fx.js"></script><script src="../js/commission.js"></script><script src="../js/notifications.js"></script>
<script src="../js/payment.js"></script><script src="../js/cart.js"></script><script src="../js/seed.js"></script>
<script>
const actionBadge = {
  price_update:  'badge-blue',
  stock_adjust:  'badge-green',
  fx_update:     'badge-purple',
  supplier_sync: 'badge-warning',
  product_create:'badge-success'
};

function actionLabel(a) {
  const map = { price_update:'💲 Price Update', stock_adjust:'📦 Stock Adjust', fx_update:'💱 FX Update', supplier_sync:'🔄 Supplier Sync', product_create:'🆕 Created' };
  return map[a] || a;
}

function renderTable() {
  const supF    = document.getElementById('filter-supplier').value;
  const actF    = document.getElementById('filter-action').value;
  const search  = document.getElementById('filter-product').value.toLowerCase();

  let data = db.get('product_sync_logs').sort((a,b) => new Date(b.sync_time) - new Date(a.sync_time));
  if (supF)   data = data.filter(l => l.supplier_id == supF);
  if (actF)   data = data.filter(l => l.action === actF);
  if (search) {
    data = data.filter(l => {
      const p = db.find('products', l.product_id);
      return p && p.name.toLowerCase().includes(search);
    });
  }

  document.getElementById('log-count').textContent = `${data.length} log entries`;

  document.getElementById('log-table').innerHTML = data.length
    ? data.map(l => {
        const p = db.find('products',  l.product_id)  || {};
        const s = db.find('suppliers', l.supplier_id) || {};
        const priceDiff = l.new_price != null && l.old_price != null
          ? (l.new_price > l.old_price
              ? `<span style="color:#ef4444;">↑</span>`
              : l.new_price < l.old_price
                ? `<span style="color:#10b981;">↓</span>`
                : '')
          : '';
        const stockDiff = l.new_stock != null && l.old_stock != null
          ? (l.new_stock > l.old_stock
              ? `<span style="color:#10b981;">↑</span>`
              : l.new_stock < l.old_stock
                ? `<span style="color:#ef4444;">↓</span>`
                : '')
          : '';
        return `<tr>
          <td>${l.id}</td>
          <td><strong>${p.name || '—'}</strong></td>
          <td>${s.name || '—'}</td>
          <td><span class="badge ${actionBadge[l.action] || ''}">${actionLabel(l.action)}</span></td>
          <td>${l.old_price != null ? '$' + l.old_price : '—'}</td>
          <td>${l.new_price != null ? '$' + l.new_price + ' ' + priceDiff : '—'}</td>
          <td>${l.old_stock != null ? l.old_stock : '—'}</td>
          <td>${l.new_stock != null ? l.new_stock + ' ' + stockDiff : '—'}</td>
          <td style="max-width:200px;white-space:normal;color:#64748b;font-size:12px;">${l.notes || '—'}</td>
          <td style="white-space:nowrap;">${utils.formatDateTime(l.sync_time)}</td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="10" style="text-align:center;padding:24px;color:#94a3b8;">No sync logs found</td></tr>';
}

function clearLogs() {
  if (!utils.confirm('Clear ALL sync logs? This cannot be undone.')) return;
  db.get('product_sync_logs').forEach(l => db.delete('product_sync_logs', l.id));
  utils.toast('All logs cleared', 'info');
  renderTable();
}

document.addEventListener('DOMContentLoaded', () => {
  seedDatabase();
  if (!auth.requireRole('admin')) return;

  const supSel = document.getElementById('filter-supplier');
  db.get('suppliers').forEach(s => {
    const o = document.createElement('option');
    o.value = s.id; o.textContent = s.name;
    supSel.appendChild(o);
  });

  renderTable();
});
</script>
</body></html>
