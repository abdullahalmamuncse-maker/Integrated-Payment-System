<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Admin | Integrated Payment System</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand"><a href="index.html"><span>💳</span><div><div>IPS Admin</div><small>Integrated Payment System</small></div></a></div>
    <nav class="sidebar-nav">
      <a href="index.html"         class="sidebar-link"><span class="sidebar-link-icon">📊</span> Dashboard</a>
      <a href="orders.html"        class="sidebar-link active"><span class="sidebar-link-icon">📦</span> Orders</a>
      <a href="products.html"      class="sidebar-link"><span class="sidebar-link-icon">🛍️</span> Products</a>
      <a href="customers.html"     class="sidebar-link"><span class="sidebar-link-icon">👥</span> Customers</a>
      <a href="suppliers.html"     class="sidebar-link"><span class="sidebar-link-icon">🏭</span> Suppliers</a>
      <a href="fx-rates.html"      class="sidebar-link"><span class="sidebar-link-icon">💱</span> FX Rates</a>
      <a href="commissions.html"   class="sidebar-link"><span class="sidebar-link-icon">💰</span> Commissions</a>
      <a href="inventory.html"     class="sidebar-link"><span class="sidebar-link-icon">📋</span> Inventory</a>
      <a href="notifications.html" class="sidebar-link"><span class="sidebar-link-icon">🔔</span> Notifications</a>
      <a href="sync-logs.html"     class="sidebar-link"><span class="sidebar-link-icon">🔄</span> Sync Logs</a>
      <a href="../index.html"      class="sidebar-link"><span class="sidebar-link-icon">🏠</span> View Store</a>
    </nav>
    <div class="sidebar-footer"><button onclick="auth.logout()" style="width:100%;background:rgba(239,68,68,.15);color:#f87171;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">Logout</button></div>
  </aside>
  <main class="admin-main">
    <header class="admin-header"><div class="admin-header-title">Order Management</div></header>
    <div class="admin-content">
      <div class="search-bar">
        <input id="search" class="search-input" placeholder="🔍 Search by customer or order #..." oninput="renderTable()">
        <select id="status-filter" class="search-input" style="width:160px;" onchange="renderTable()">
          <option value="">All Statuses</option>
          <option>pending</option><option>confirmed</option><option>processing</option><option>shipped</option><option>delivered</option><option>cancelled</option>
        </select>
      </div>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Total (BDT)</th><th>Payment</th><th>Status</th><th>Date</th><th>Update Status</th></tr></thead>
          <tbody id="order-table"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="../js/db.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script src="../js/fx.js"></script><script src="../js/commission.js"></script><script src="../js/notifications.js"></script>
<script src="../js/payment.js"></script><script src="../js/cart.js"></script><script src="../js/seed.js"></script>
<script>
const STATUSES = ['pending','processing','confirmed','shipped','delivered','cancelled'];

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('status-filter').value;
  let orders = db.get('orders').sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
  if (status) orders = orders.filter(o => o.status === status);
  if (search) orders = orders.filter(o => {
    const c = db.find('customers', o.customer_id);
    return String(o.id).includes(search) || (c?.name || '').toLowerCase().includes(search);
  });

  document.getElementById('order-table').innerHTML = orders.map(o => {
    const c   = db.find('customers', o.customer_id) || {};
    const pay = db.findOne('payments', p => p.order_id === o.id);
    const itemCount = db.count('order_items', i => i.order_id === o.id);
    const opts = STATUSES.map(s => `<option value="${s}" ${s===o.status?'selected':''}>${s}</option>`).join('');
    return `<tr>
      <td><strong>#${o.id}</strong></td>
      <td>${c.name || '—'}<br><span style="font-size:11px;color:#94a3b8;">${c.email || ''}</span></td>
      <td>${itemCount} item${itemCount!==1?'s':''}</td>
      <td><strong>${utils.formatBDT(o.total_amount_bdt)}</strong></td>
      <td>${pay ? utils.statusBadge(pay.status) : '<span style="color:#94a3b8;">—</span>'}</td>
      <td>${utils.statusBadge(o.status)}</td>
      <td>${utils.formatDate(o.created_at)}</td>
      <td>
        <select onchange="updateOrderStatus(${o.id}, this.value, ${o.customer_id})" style="padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
          ${opts}
        </select>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8;">No orders found</td></tr>';
}

function updateOrderStatus(orderId, newStatus, customerId) {
  db.update('orders', orderId, { status: newStatus });
  notifications.send('order_status_update', 'customer', customerId, `Your order #${orderId} status updated to: ${newStatus}`);
  utils.toast(`Order #${orderId} → ${newStatus}`, 'success');
  renderTable();
}

document.addEventListener('DOMContentLoaded', () => {
  seedDatabase(); if (!auth.requireRole('admin')) return; renderTable();
});
</script>
</body>
</html>
