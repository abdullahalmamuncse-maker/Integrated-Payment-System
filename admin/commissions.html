<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Commissions — Admin | IPS</title><link rel="stylesheet" href="../css/admin.css"></head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand"><a href="index.html"><span>💳</span><div><div>IPS Admin</div><small>Integrated Payment System</small></div></a></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span> Dashboard</a>
      <a href="orders.html" class="sidebar-link"><span class="sidebar-link-icon">📦</span> Orders</a>
      <a href="products.html" class="sidebar-link"><span class="sidebar-link-icon">🛍️</span> Products</a>
      <a href="customers.html" class="sidebar-link"><span class="sidebar-link-icon">👥</span> Customers</a>
      <a href="suppliers.html" class="sidebar-link"><span class="sidebar-link-icon">🏭</span> Suppliers</a>
      <a href="fx-rates.html" class="sidebar-link"><span class="sidebar-link-icon">💱</span> FX Rates</a>
      <a href="commissions.html" class="sidebar-link active"><span class="sidebar-link-icon">💰</span> Commissions</a>
      <a href="inventory.html" class="sidebar-link"><span class="sidebar-link-icon">📋</span> Inventory</a>
      <a href="notifications.html" class="sidebar-link"><span class="sidebar-link-icon">🔔</span> Notifications</a>
      <a href="sync-logs.html" class="sidebar-link"><span class="sidebar-link-icon">🔄</span> Sync Logs</a>
      <a href="../index.html" class="sidebar-link"><span class="sidebar-link-icon">🏠</span> View Store</a>
    </nav>
    <div class="sidebar-footer"><button onclick="auth.logout()" style="width:100%;background:rgba(239,68,68,.15);color:#f87171;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">Logout</button></div>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-header-title">Commission Management</div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Commission Rule</button>
    </header>
    <div class="admin-content">
      <div class="data-table-wrap">
        <table class="data-table">
          <thead><tr><th>#</th><th>Supplier</th><th>Percentage (%)</th><th>Fixed Fee (BDT)</th><th>Effective From</th><th>Effective To</th><th>Actions</th></tr></thead>
          <tbody id="comm-table"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Commission Rule</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group"><label class="form-label">Supplier *</label><select id="f-sup" class="form-control"></select></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Percentage (%) *</label><input id="f-pct" class="form-control" type="number" step="0.01" placeholder="8.00"></div>
        <div class="form-group"><label class="form-label">Fixed Fee (BDT)</label><input id="f-fee" class="form-control" type="number" step="0.01" placeholder="50.00"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Effective From</label><input id="f-from" class="form-control" type="date"></div>
        <div class="form-group"><label class="form-label">Effective To</label><input id="f-to" class="form-control" type="date"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveComm()">Save Rule</button>
    </div>
  </div>
</div>
<script src="../js/db.js"></script><script src="../js/auth.js"></script><script src="../js/utils.js"></script>
<script src="../js/fx.js"></script><script src="../js/commission.js"></script><script src="../js/notifications.js"></script>
<script src="../js/payment.js"></script><script src="../js/cart.js"></script><script src="../js/seed.js"></script>
<script>
let editingId = null;

function render() {
  document.getElementById('comm-table').innerHTML = db.get('commissions').map(c => {
    const s = db.find('suppliers', c.supplier_id) || {};
    return `<tr>
      <td>${c.id}</td><td><strong>${s.name || '—'}</strong></td>
      <td><strong style="color:#4f46e5;">${c.percentage}%</strong></td>
      <td>${utils.formatBDT(c.fixed_fee_bdt)}</td>
      <td>${utils.formatDate(c.effective_from)}</td>
      <td>${utils.formatDate(c.effective_to)}</td>
      <td class="table-actions">
        <button class="btn btn-ghost btn-xs" onclick="editComm(${c.id})">✏️ Edit</button>
        <button class="btn btn-danger btn-xs" onclick="deleteComm(${c.id})">🗑</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" style="text-align:center;padding:24px;color:#94a3b8;">No commission rules</td></tr>';
}

function openModal(id = null) {
  editingId = id;
  const supSel = document.getElementById('f-sup');
  supSel.innerHTML = db.get('suppliers').map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  ['f-pct','f-fee','f-from','f-to'].forEach(fid => document.getElementById(fid).value = '');
  if (id) {
    const c = db.find('commissions', id);
    if (c) {
      document.getElementById('f-sup').value  = c.supplier_id;
      document.getElementById('f-pct').value  = c.percentage;
      document.getElementById('f-fee').value  = c.fixed_fee_bdt;
      document.getElementById('f-from').value = c.effective_from?.slice(0,10);
      document.getElementById('f-to').value   = c.effective_to?.slice(0,10);
    }
  } else {
    document.getElementById('f-from').value = new Date().toISOString().slice(0,10);
    document.getElementById('f-to').value   = '2099-12-31';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveComm() {
  const supId = parseInt(document.getElementById('f-sup').value);
  const pct   = parseFloat(document.getElementById('f-pct').value);
  const fee   = parseFloat(document.getElementById('f-fee').value) || 0;
  const from  = document.getElementById('f-from').value;
  const to    = document.getElementById('f-to').value;
  if (!supId || isNaN(pct)) { utils.toast('Supplier and percentage required', 'error'); return; }

  const data = { supplier_id:supId, percentage:pct, fixed_fee_bdt:fee, effective_from: from ? new Date(from).toISOString() : new Date().toISOString(), effective_to: to ? new Date(to).toISOString() : '2099-12-31T23:59:59.000Z' };
  if (editingId) { db.update('commissions', editingId, data); utils.toast('Updated', 'success'); }
  else { db.insert('commissions', data); utils.toast('Commission rule added', 'success'); }
  closeModal(); render();
}

function editComm(id)   { openModal(id); }
function deleteComm(id) { if (!utils.confirm('Delete this rule?')) return; db.delete('commissions', id); utils.toast('Deleted', 'info'); render(); }

document.addEventListener('DOMContentLoaded', () => { seedDatabase(); if (!auth.requireRole('admin')) return; render(); });
</script>
</body></html>
